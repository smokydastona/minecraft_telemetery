name: Build (Forge 1.20.1)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify locale sync and translation coverage
        shell: pwsh
        run: |
          ./tools/sync_lang_files.ps1
          $changes = git status --porcelain -- src/main/resources/assets/bassshakertelemetry/lang
          if ($changes) {
            Write-Host 'Locale files are out of sync with src/main/resources/assets/bassshakertelemetry/lang/en_us.json.'
            Write-Host 'Run ./tools/sync_lang_files.ps1 locally and commit the resulting locale updates.'
            git --no-pager diff -- src/main/resources/assets/bassshakertelemetry/lang
            exit 1
          }

          $changedLocaleFiles = @()
          if ('${{ github.event_name }}' -eq 'pull_request') {
            $baseRef = 'origin/${{ github.base_ref }}'
            $mergeBase = git merge-base HEAD $baseRef
            if ($mergeBase) {
              $changedLocaleFiles = @(git diff --name-only $mergeBase HEAD -- 'src/main/resources/assets/bassshakertelemetry/lang/*.json')
            }
          }
          else {
            $before = '${{ github.event.before }}'
            if ($before -and $before -ne '0000000000000000000000000000000000000000') {
              $changedLocaleFiles = @(git diff --name-only $before HEAD -- 'src/main/resources/assets/bassshakertelemetry/lang/*.json')
            }
          }

          $changedLocaleNames = @($changedLocaleFiles | ForEach-Object { Split-Path $_ -Leaf } | Where-Object { $_ -ne 'en_us.json' } | Sort-Object -Unique)
          if ($changedLocaleNames.Count -gt 0) {
            Write-Host ('Translation gate applies to changed locale files: ' + ($changedLocaleNames -join ', '))
          }
          else {
            Write-Host 'No non-English locale files changed in this event; translation gate will only enforce structural sync.'
          }

          ./tools/validate_lang_files.ps1 -FailOnSuspiciousFallbacks -MaxSuspiciousPercent 35 -MaxSameAsEnglishPercent 90 -RequireTranslatedFiles $changedLocaleNames

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bassshakertelemetry-jars
          path: build/libs/*.jar
          if-no-files-found: error
