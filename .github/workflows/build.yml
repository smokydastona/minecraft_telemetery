name: Build (Forge 1.20.1)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify locale sync and translation coverage
        shell: pwsh
        run: |
          ./tools/sync_lang_files.ps1
          $changes = git status --porcelain -- src/main/resources/assets/bassshakertelemetry/lang
          if ($changes) {
            Write-Host 'Locale files are out of sync with src/main/resources/assets/bassshakertelemetry/lang/en_us.json.'
            Write-Host 'Run ./tools/sync_lang_files.ps1 locally and commit the resulting locale updates.'
            git --no-pager diff -- src/main/resources/assets/bassshakertelemetry/lang
            exit 1
          }

          ./tools/validate_lang_files.ps1 -FailOnSuspiciousFallbacks -MaxSuspiciousPercent 35 -MaxSameAsEnglishPercent 15

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon clean build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bassshakertelemetry-jars
          path: build/libs/*.jar
          if-no-files-found: error
